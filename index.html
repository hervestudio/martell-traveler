<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARTELL — The Journey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060b22; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---- Brand overlay (key-visual style) ---- */
    .brand {
      position: fixed; top: 38px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none; z-index: 10;
      font-family: "Times New Roman", Georgia, serif;
      color: #f6f1e3;
      text-shadow: 0 2px 24px rgba(0,0,0,.55);
    }
    .brand .mark { font-size: 13px; letter-spacing: 2px; opacity: .85; margin-bottom: 6px; }
    .brand .name { font-size: 40px; letter-spacing: 14px; font-weight: 500; padding-left: 14px; }
    .brand .sub  { font-size: 11px; letter-spacing: 8px; opacity: .7; margin-top: 4px; padding-left: 8px; }

    /* ---- Controls hint ---- */
    .hint {
      position: fixed; left: 18px; bottom: 16px; z-index: 10;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px; line-height: 1.7; color: rgba(246,241,227,.6);
      pointer-events: none; user-select: none;
    }
    .hint b { color: #ffe6a8; font-weight: 600; }

    /* ---- Score ---- */
    #score {
      position: fixed; left: 18px; top: 18px; z-index: 10;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 15px; color: #ffd98a; pointer-events: none; user-select: none;
      text-shadow: 0 2px 12px rgba(0,0,0,.6); letter-spacing: 1px;
    }

    /* ---- Toggle couleur (interrupteur coulissant) ---- */
    #colorToggle {
      position: fixed; left: 18px; bottom: 64px; z-index: 11;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px;
      color: rgba(246,241,227,.7); background: rgba(16,24,52,.55);
      border: 1px solid rgba(246,241,227,.18); padding: 7px 14px 7px 8px; border-radius: 24px;
      cursor: pointer; user-select: none; display: flex; align-items: center; gap: 10px;
      backdrop-filter: blur(4px); transition: color .2s ease, border-color .2s ease;
    }
    #colorToggle .switch {
      position: relative; width: 44px; height: 23px; border-radius: 12px; flex: none;
      background: rgba(246,241,227,.22); transition: background .25s ease;
    }
    #colorToggle .knob {
      position: absolute; top: 2.5px; left: 2.5px; width: 18px; height: 18px; border-radius: 50%;
      background: #f6f1e3; transition: left .25s cubic-bezier(.4,1.3,.5,1), background .25s ease;
      display: grid; place-items: center;
    }
    #colorToggle .knob::after {
      content: "\2715"; font-size: 10px; line-height: 1; font-weight: 700; color: #8a8a93;
    }
    #colorToggle.on { color: #ffe6a8; border-color: rgba(255,217,138,.6); }
    #colorToggle.on .switch { background: #e9c30d; }
    #colorToggle.on .knob { left: 23.5px; }
    #colorToggle.on .knob::after { content: "\2713"; color: #9a7c08; }
    #colorToggle .state { min-width: 22px; opacity: .85; }

    /* ---- Loading ---- */
    #loader {
      position: fixed; inset: 0; z-index: 20; display: grid; place-items: center;
      background: #060b22; transition: opacity .8s ease; color: #f6f1e3;
      font-family: "Times New Roman", serif; letter-spacing: 10px; font-size: 22px;
      text-align: center; padding: 30px;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader.error {
      font-family: ui-monospace, Consolas, monospace; font-size: 13px;
      letter-spacing: 0; color: #ff9b9b; white-space: pre-wrap; line-height: 1.6;
      align-content: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="brand">
    <div class="mark">✶</div>
    <div class="name">MARTELL</div>
    <div class="sub">THE&nbsp;JOURNEY</div>
  </div>

  <div class="hint">
    <div><b>C</b> — caméra libre / suivi &nbsp;·&nbsp; <b>Espace</b> — pause</div>
    <div>Panneau en haut à droite pour régler chemin &amp; personnage</div>
  </div>

  <div id="score">Sphères : 0 / 0</div>

  <button id="colorToggle" title="Le perso prend la couleur de la dernière sphère mangée">
    <span class="switch"><span class="knob"></span></span>
    <span>Couleur sphère</span>
    <span class="state">OFF</span>
  </button>

  <div id="loader">MARTELL</div>

  <!-- Affiche toute erreur à l'écran au lieu de rester bloqué sur le loader -->
  <script>
    function showError(msg) {
      var l = document.getElementById('loader');
      if (!l) return;
      if (l.classList.contains('error')) return;   // ne pas écraser une stack déjà affichée
      l.classList.remove('hidden');
      l.classList.add('error');
      l.textContent = '⚠ Erreur de chargement\n\n' + msg +
        '\n\nOuvre la console (F12) pour le détail.';
    }
    window.addEventListener('error', function (e) {
      showError((e.message || 'erreur') + (e.filename ? '\n' + e.filename + ':' + e.lineno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      showError('Promise rejetée : ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
